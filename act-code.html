<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';

            letter-spacing: normal;

<body class="font-body-md text-on-surface antialiased min-h-screen pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-40 bg-surface dark:bg-surface-container border-b border-outline-variant flat no shadows flex items-center justify-between px-margin-mobile h-16 transition-colors md:hidden">

</div>

<!-- Desktop Top Nav Placeholder (Hidden on Mobile) -->

</div>
<nav class="flex gap-8">

            </a>
<a class="text-primary font-bold font-label-caps text-label-caps border-b-2 border-primary px-4 py-2 flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-sm">history_edu</span> History
            </a>
</nav>
<div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden border border-outline-variant flex items-center justify-center">

</div>
</header>
<!-- Main Content -->
<main class="pt-20 md:pt-24 px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto">
<div class="flex items-center justify-between mb-8">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-on-surface">Activity History</h2>
<button class="flex items-center gap-2 text-carbon-black border border-carbon-black px-4 py-2 rounded-DEFAULT font-label-caps text-label-caps hover:bg-surface-container transition-colors" onclick="fetchData()">
<span class="material-symbols-outlined text-sm">refresh</span> REFRESH
            </button>
</div>
<!-- Filters / Summary -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
<div class="glass-card p-4 rounded-lg flex flex-col justify-between h-24">
<span class="font-label-caps text-label-caps text-on-surface-variant">TOTAL LOGS</span>
<span class="font-headline-lg text-carbon-black" id="total-logs">--</span>
</div>
<div class="glass-card p-4 rounded-lg flex flex-col justify-between h-24">
<span class="font-label-caps text-label-caps text-on-surface-variant">TOTAL VALUE</span>
<span class="font-headline-lg text-structural-red" id="total-value">$--</span>
</div>
<div class="glass-card p-4 rounded-lg flex flex-col justify-between h-24 hidden md:flex">
<span class="font-label-caps text-label-caps text-on-surface-variant">RECENT CLIENT</span>

</div>
<div class="glass-card p-4 rounded-lg flex flex-col justify-between h-24 hidden md:flex">
<span class="font-label-caps text-label-caps text-on-surface-variant">LAST UPDATED</span>

<!-- Data Container -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="history-container">
<!-- Loading Skeletons -->

</div>
<div class="glass-card p-0 rounded-lg overflow-hidden skeleton-loader">
<div class="h-12 bg-surface-container-high shimmer border-b border-outline-variant"></div>
<div class="p-4 space-y-4">
<div class="h-4 bg-surface-container-high shimmer w-3/4 rounded-DEFAULT"></div>
<div class="h-8 bg-surface-container-high shimmer w-1/2 rounded-DEFAULT"></div>
<div class="h-4 bg-surface-container-high shimmer w-full rounded-DEFAULT"></div>

<div class="glass-card p-0 rounded-lg overflow-hidden skeleton-loader">
<div class="h-12 bg-surface-container-high shimmer border-b border-outline-variant"></div>
<div class="p-4 space-y-4">
<div class="h-4 bg-surface-container-high shimmer w-3/4 rounded-DEFAULT"></div>
<div class="h-8 bg-surface-container-high shimmer w-1/2 rounded-DEFAULT"></div>
<div class="h-4 bg-surface-container-high shimmer w-full rounded-DEFAULT"></div>
<div class="h-4 bg-surface-container-high shimmer w-5/6 rounded-DEFAULT"></div>
</div>
</div>

</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 bg-surface dark:bg-surface-container-low border-t border-outline-variant shadow-sm md:hidden">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-6 py-1.5 hover:bg-surface-container-highest transition-all active:scale-95 duration-100" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">add_task</span>
<span class="font-label-caps text-label-caps">Log Activity</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-xl px-6 py-1.5 hover:bg-surface-container-highest transition-all active:scale-95 duration-100" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">history_edu</span>
<span class="font-label-caps text-label-caps">History</span>

<!-- Image Modal -->
<div class="fixed inset-0 z-50 bg-carbon-black/90 hidden items-center justify-center p-4 backdrop-blur-sm" id="image-modal" onclick="closeModal()">
<div class="max-w-4xl w-full relative" onclick="event.stopPropagation()">
<button class="absolute -top-12 right-0 text-white hover:text-outline-variant p-2" onclick="closeModal()">
<span class="material-symbols-outlined text-3xl">close</span>
</button>
<img alt="Full size image view" class="w-full h-auto max-h-[707px] object-contain rounded-DEFAULT border border-outline-variant" id="modal-image" src=""/>
<div class="text-white mt-4 font-body-md text-center" id="modal-caption"></div>
</div>
</div>
<script>
        // Mock Data to simulate fetch
        const mockData = [
            {
                id: 1,
                timestamp: "2023-10-27T14:30:00",
                salesperson: "J. Smith",
                client: "Apex Constructors",
                amount: 45000,
                type: "Contract Sign",
                note: "Finalized phase 1 delivery schedule for prestressed beams. Client requested accelerated timeline.",
                hasImage: true,
                imageTitle: "Signed Contract P1",
                imageUrl: "https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
            },
            {
                id: 2,
                timestamp: "2023-10-26T09:15:00",
                salesperson: "J. Smith",
                client: "BuildCorp Inc",
                amount: 12500,
                type: "Site Visit",
                note: "Inspected footing preparation. Discussed potential order increase for retaining wall panels.",
                hasImage: false
            },
            {
                id: 3,
                timestamp: "2023-10-25T16:45:00",
                salesperson: "M. Johnson",
                client: "Metro Developments",
                amount: 85000,
                type: "Quote Generated",
                note: "Provided comprehensive quote for multi-story parking structure elements.",
                hasImage: true,
                imageTitle: "Site Blueprint Markup",
                imageUrl: "https://images.unsplash.com/photo-1503387762-592deb58ef4e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
            },
             {
                id: 4,
                timestamp: "2023-10-24T11:20:00",
                salesperson: "J. Smith",
                client: "BridgeWay Logistics",
                amount: null,
                type: "Meeting",
                note: "Initial consultation for warehouse expansion. Pending architectural drawings before quote.",
                hasImage: false
            }
        ];

        function formatDate(isoString) {
            const date = new Date(isoString);
            return new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }).format(date);
        }

        function formatCurrency(amount) {
            if (amount === null || amount === undefined) return 'N/A';
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(amount);
        }

        function openModal(imgSrc, caption) {
            document.getElementById('modal-image').src = imgSrc;
            document.getElementById('modal-caption').textContent = caption;
            document.getElementById('image-modal').classList.remove('hidden');
            document.getElementById('image-modal').classList.add('flex');
            document.body.style.overflow = 'hidden'; // Prevent scrolling
        }

        function closeModal() {
            document.getElementById('image-modal').classList.add('hidden');
            document.getElementById('image-modal').classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        function renderCards(data) {
            const container = document.getElementById('history-container');
            container.innerHTML = ''; // Clear skeletons

            let totalValue = 0;

            data.forEach(item => {
                if(item.amount) totalValue += item.amount;

                // Determine tag color based on type
                let tagClass = "bg-surface-container text-on-surface-variant";
                if(item.type === "Contract Sign") tagClass = "bg-green-100 text-green-800 border border-green-200";
                if(item.type === "Quote Generated") tagClass = "bg-secondary-fixed text-on-secondary-fixed border border-secondary-fixed-dim";

                const cardHTML = `
                    <div class="glass-card rounded-lg overflow-hidden flex flex-col">
                        <div class="bg-concrete-surface px-4 py-3 border-b border-outline-variant flex justify-between items-center">
                            <span class="font-label-caps text-label-caps text-on-surface-variant">${formatDate(item.timestamp)}</span>
                            <span class="font-label-caps text-label-caps px-2 py-1 rounded-sm ${tagClass}">${item.type}</span>
                        </div>
                        <div class="p-4 flex-grow flex flex-col gap-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-headline-sm text-carbon-black leading-tight">${item.client}</h3>
                                    <p class="font-body-sm text-on-surface-variant mt-1"><span class="material-symbols-outlined text-[14px] align-middle mr-1">person</span>${item.salesperson}</p>
                                </div>
                                <div class="text-right">
                                    <span class="block font-headline-md text-structural-red">${formatCurrency(item.amount)}</span>
                                </div>
                            </div>
                            
                            <p class="font-body-md text-carbon-black border-l-2 border-outline-variant pl-3 py-1 flex-grow">${item.note}</p>
                            
                            ${item.hasImage ? `
                                <div class="mt-2 border border-outline-variant rounded-DEFAULT overflow-hidden cursor-pointer group relative" onclick="openModal('${item.imageUrl}', '${item.imageTitle}')">
                                    <img src="${item.imageUrl}" alt="Thumbnail for ${item.imageTitle}" class="w-full h-24 object-cover group-hover:scale-105 transition-transform duration-300">
                                    <div class="absolute inset-0 bg-carbon-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                        <span class="material-symbols-outlined text-white">zoom_in</span>
                                    </div>
                                    <div class="absolute bottom-0 left-0 w-full bg-carbon-black/70 px-2 py-1">
                                        <span class="font-label-caps text-label-caps text-white flex items-center gap-1">
                                            <span class="material-symbols-outlined text-[12px]">image</span> ${item.imageTitle}
                                        </span>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });

            // Update Summary
            document.getElementById('total-logs').textContent = data.length;
            document.getElementById('total-value').textContent = formatCurrency(totalValue);
            document.getElementById('recent-client').textContent = data[0]?.client || '--';
            
            const now = new Date();
            document.getElementById('last-updated').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function fetchData() {
            // Re-show skeletons
            const container = document.getElementById('history-container');
            container.innerHTML = `
                <div class="glass-card p-0 rounded-lg overflow-hidden skeleton-loader"><div class="h-12 bg-surface-container-high shimmer border-b border-outline-variant"></div><div class="p-4 space-y-4"><div class="h-4 bg-surface-container-high shimmer w-3/4 rounded-DEFAULT"></div><div class="h-8 bg-surface-container-high shimmer w-1/2 rounded-DEFAULT"></div><div class="h-4 bg-surface-container-high shimmer w-full rounded-DEFAULT"></div></div></div>
                <div class="glass-card p-0 rounded-lg overflow-hidden skeleton-loader"><div class="h-12 bg-surface-container-high shimmer border-b border-outline-variant"></div><div class="p-4 space-y-4"><div class="h-4 bg-surface-container-high shimmer w-3/4 rounded-DEFAULT"></div><div class="h-8 bg-surface-container-high shimmer w-1/2 rounded-DEFAULT"></div><div class="h-4 bg-surface-container-high shimmer w-full rounded-DEFAULT"></div></div></div>
            `;

            // Simulate network delay
            setTimeout(() => {
                renderCards(mockData);
            }, 800);
        }

        // Initial load
        document.addEventListener('DOMContentLoaded', fetchData);

        // Escape key to close modal
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeModal();
            }
        });
    </script>
</body></html>
