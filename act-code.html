<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>SalesTrack - ประวัติ (HFC)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#98001b', secondary: '#be1e2d', surface: '#f5eced' },
                    fontFamily: { sans: ['"IBM Plex Sans Thai"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style> body { background-color: #f5eced; } </style>
</head>
<body class="text-gray-900 pb-20">
    <header class="bg-primary text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold">ประวัติกิจกรรม</h1>
        <button onclick="fetchData()" class="material-symbols-outlined active:rotate-180 transition">refresh</button>
    </header>

    <main class="p-4 max-w-md mx-auto mt-2 space-y-4" id="history-container">
        </main>

    <div id="imageModal" class="fixed inset-0 bg-black bg-opacity-80 z-50 hidden flex justify-center items-center p-4">
        <div class="relative w-full max-w-lg">
            <button onclick="closeModal()" class="absolute -top-10 right-0 text-white flex items-center gap-1">
                <span class="material-symbols-outlined">close</span> ปิด
            </button>
            <img id="modalImage" src="" class="w-full h-auto rounded-md max-h-[80vh] object-contain" />
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-2 pb-4 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-gray-600 w-1/2">
            <span class="material-symbols-outlined">edit_document</span>
            <span class="text-xs mt-1">บันทึกข้อมูล</span>
        </a>
        <a href="act-code.html" class="flex flex-col items-center text-primary font-semibold w-1/2">
            <span class="material-symbols-outlined">history</span>
            <span class="text-xs mt-1">ประวัติ</span>
        </a>
    </nav>

    <script>
        // 👇👇 นำ Web App URL ของคุณมาใส่ตรงนี้ 👇👇
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyQfVzJ4rVktXMJ76VRM_zQ2k5wV4Sz4I4haBuOI6BcYqBdxfxZd7OJhr5hKzMOCaya/exec";
        // 👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆👆

        function fetchData() {
            const container = document.getElementById('history-container');
            container.innerHTML = `<div class="text-center text-gray-500 mt-10"><span class="material-symbols-outlined animate-spin text-4xl">sync</span><p class="mt-2">กำลังโหลดข้อมูล...</p></div>`;

            fetch(GAS_WEB_APP_URL)
                .then(res => res.json())
                .then(result => {
                    if (result.status === 'success') {
                        renderCards(result.data.reverse());
                    } else {
                        container.innerHTML = `<div class="text-center text-red-600 mt-10">เกิดข้อผิดพลาด: ${result.message}</div>`;
                    }
                })
                .catch(err => {
                    container.innerHTML = `<div class="text-center text-red-600 mt-10">ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้</div>`;
                });
        }

        function renderCards(data) {
            const container = document.getElementById('history-container');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 mt-10">ยังไม่มีข้อมูลกิจกรรม</div>`;
                return;
            }

            data.forEach(item => {
                if(!item.Timestamp && !item.Salesperson) return;
                
                const dateObj = new Date(item.Timestamp);
                const dateString = isNaN(dateObj) ? item.Timestamp : dateObj.toLocaleString('th-TH');
                const amountText = item.Amount ? `฿${parseFloat(item.Amount).toLocaleString()}` : '-';
                
                let imageHtml = '';
                if (item['Image URL'] && item['Image URL'].trim() !== "") {
                    const driveImageUrl = item['Image URL'];
                    let previewUrl = '';
                    
                    // ใช้ Regex ดึง File ID เพื่อสร้างลิงก์สำหรับดึงรูปมาแสดงตรงๆ (Direct Stream)
                    const match = driveImageUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
                    if (match && match[1]) {
                        previewUrl = `https://lh3.googleusercontent.com/d/${match[1]}=w400`;
                    }

                    imageHtml = `
                        <div class="mt-3 pt-2 border-t border-gray-100">
                            <p class="text-xs text-gray-500 mb-2 flex items-center gap-1">
                                <span class="material-symbols-outlined text-[16px]">image</span> 
                                <span>${item['Image Title'] || 'รูปภาพแนบ'}</span>
                            </p>
                            ${previewUrl ? `<img src="${previewUrl}" onclick="openModal('${previewUrl}')" class="h-28 w-auto rounded border border-gray-200 cursor-pointer object-cover mb-2 max-w-full hover:opacity-90 transition" onerror="this.style.display='none'" />` : ''}
                            <div class="mt-1">
                                <a href="${driveImageUrl}" target="_blank" class="inline-flex items-center gap-1.5 bg-gray-100 hover:bg-gray-200 text-primary text-xs font-semibold py-1.5 px-2.5 rounded border border-gray-300 transition">
                                    <span class="material-symbols-outlined text-[14px]">open_in_new</span>
                                    เปิดดูรูปเต็มบน Google Drive
                                </a>
                            </div>
                        </div>
                    `;
                }

                const cardHtml = `
                    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
                        <div class="flex justify-between items-start border-b border-gray-100 pb-2 mb-2">
                            <div>
                                <h3 class="font-bold text-primary">${item.Client || 'ไม่ระบุลูกค้า'}</h3>
                                <p class="text-xs text-gray-500">${dateString}</p>
                            </div>
                            <div class="bg-gray-100 text-gray-700 px-2 py-1 rounded text-xs font-semibold">
                                ยอดขาย: ${amountText}
                            </div>
                        </div>
                        <p class="text-sm"><strong>เซลล์:</strong> ${item.Salesperson || '-'}</p>
                        ${item.Note ? `<p class="text-sm mt-1 text-gray-600"><strong>Note:</strong> ${item.Note}</p>` : ''}
                        ${imageHtml}
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        function openModal(imgUrl) {
            document.getElementById('modalImage').src = imgUrl;
            document.getElementById('imageModal').classList.remove('hidden');
        }
        function closeModal() {
            document.getElementById('imageModal').classList.add('hidden');
            document.getElementById('modalImage').src = '';
        }

        document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
